<svg viewBox="0 0 1300 620" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">AWS Cloud architecture for ci-cd</title>
  <desc id="desc">GitHub Actions deploy job assumes an IAM role via OIDC, syncs to a private S3 bucket, read only by CloudFront via Origin Access Control, served to visitors over HTTPS. Terraform provisions the AWS Cloud resources.</desc>
  <defs>
    <marker id="a-grey" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8a8f98"/></marker>
    <marker id="a-red" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#dd344c"/></marker>
    <marker id="a-green" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#7aa116"/></marker>
    <marker id="a-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#8c4fff"/></marker>
    <marker id="a-tf" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#844fba"/></marker>
  </defs>

  <rect width="1300" height="620" fill="#ffffff"/>

  <!-- ===== AWS Cloud boundary ===== -->
  <rect x="430" y="60" width="620" height="420" rx="4" fill="#232f3e0A" stroke="#232f3e" stroke-width="1.6"/>
  <path d="M430 84 h620" stroke="#232f3e" stroke-width="1.6"/>
  <g transform="translate(444,64)">
    <rect width="15" height="15" rx="3" fill="#232f3e"/>
    <path d="M3 8.5c0-2.8 2.2-5 5-5M12 6.5c0 2.8-2.2 5-5 5" stroke="#fff" stroke-width="1.3" fill="none" stroke-linecap="round"/>
  </g>
  <text x="466" y="76" font-family="Segoe UI, -apple-system, sans-serif" font-size="12.5" font-weight="700" fill="#232f3e">AWS Cloud</text>

  <!-- region label -->
  <rect x="452" y="100" width="580" height="360" rx="4" fill="none" stroke="#8a8f98" stroke-width="1.2" stroke-dasharray="4 4"/>
  <text x="464" y="116" font-family="Segoe UI, -apple-system, sans-serif" font-size="10.5" fill="#757575" letter-spacing="0.03em">us-east-1</text>

  <!-- ===== GitHub (outside cloud) ===== -->
  <text x="30" y="52" font-family="Segoe UI, -apple-system, sans-serif" font-size="11.5" font-weight="700" fill="#757575" letter-spacing="0.04em">SOURCE + CI</text>
  <g font-family="Segoe UI, sans-serif">
    <g transform="translate(30,70)">
      <rect width="52" height="52" rx="9" fill="#414d5c"/>
      <g transform="translate(14,14)" stroke="#fff" stroke-width="1.7" stroke-linecap="round" fill="none"><circle cx="6.5" cy="5.5" r="2"/><circle cx="6.5" cy="16.5" r="2"/><circle cx="15.5" cy="11" r="2"/><path d="M6.5 7.5v7M6.5 11h5.8a3 3 0 002.9-2"/></g>
      <text x="26" y="70" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a1a">Repo</text>
    </g>
    <line x1="82" y1="96" x2="112" y2="96" stroke="#8a8f98" stroke-width="1.8" marker-end="url(#a-grey)"/>

    <g transform="translate(124,70)">
      <rect width="52" height="52" rx="9" fill="#414d5c"/>
      <g transform="translate(14,14)" stroke="#fff" stroke-width="1.7" stroke-linecap="round" fill="none"><circle cx="12" cy="12" r="3.4"/><path d="M12 3.5v2.4M12 20.1v-2.4M3.5 12h2.4M20.1 12h-2.4M6.2 6.2l1.7 1.7M16.1 16.1l1.7 1.7M17.8 6.2l-1.7 1.7M7.9 16.1l-1.7 1.7"/></g>
      <text x="26" y="70" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a1a">Build</text>
    </g>
    <line x1="176" y1="96" x2="206" y2="96" stroke="#8a8f98" stroke-width="1.8" marker-end="url(#a-grey)"/>

    <g transform="translate(218,70)">
      <rect width="52" height="52" rx="9" fill="#414d5c"/>
      <g transform="translate(14,14)" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M4 12.5l5 5L20 6.5"/></g>
      <text x="26" y="70" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a1a">Test</text>
    </g>
    <line x1="270" y1="96" x2="300" y2="96" stroke="#8a8f98" stroke-width="1.8" marker-end="url(#a-grey)"/>

    <g transform="translate(312,70)">
      <rect width="52" height="52" rx="9" fill="#dd344c"/>
      <g transform="translate(14,14)" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M12 2.5c2.7 1.8 4 5 4 8 0 1.8-.9 3.6-.9 3.6l-3.1 0.9-3.1-0.9S8 12.3 8 10.5c0-3 1.3-6.2 4-8z"/><circle cx="12" cy="9" r="1.4" fill="#fff" stroke="none"/><path d="M9 15.5l-1.8 4M15 15.5l1.8 4"/></g>
      <text x="26" y="70" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a1a">Deploy</text>
    </g>
  </g>

  <text x="152" y="164" text-anchor="middle" font-family="Segoe UI, -apple-system, sans-serif" font-size="10" fill="#757575" font-style="italic">push / PR</text>

  <!-- deploy -> OIDC provider (dashed, exchanges token) -->
  <path d="M338,122 C 370,150 410,168 452,178" fill="none" stroke="#dd344c" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#a-red)"/>
  <rect x="330" y="150" width="150" height="18" rx="9" fill="#ffffff" stroke="#dd344c" stroke-width="1" opacity="0.95"/>
  <text x="405" y="163" text-anchor="middle" font-size="9.5" fill="#dd344c" font-family="ui-monospace, Consolas, monospace">AssumeRoleWithWebIdentity</text>

  <!-- ===== Identity cluster ===== -->
  <text x="474" y="150" font-family="Segoe UI, -apple-system, sans-serif" font-size="10.5" font-weight="700" fill="#757575" letter-spacing="0.03em">IDENTITY</text>
  <g font-family="Segoe UI, sans-serif">
    <g transform="translate(474,166)">
      <rect width="60" height="60" rx="10" fill="#dd344c"/>
      <g transform="translate(17,17)" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none"><circle cx="8.5" cy="8.5" r="4.2"/><path d="M11.5 11.5L21 21M15.5 17l2.7-2.7M19 20.5l2.7-2.7"/></g>
      <text x="30" y="78" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1a1a1a">OIDC Provider</text>
    </g>
    <line x1="534" y1="196" x2="562" y2="196" stroke="#dd344c" stroke-width="1.8" marker-end="url(#a-red)"/>
    <g transform="translate(574,166)">
      <rect width="60" height="60" rx="10" fill="#dd344c"/>
      <g transform="translate(17,17)" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none"><rect x="4.5" y="9" width="15" height="12" rx="2.5"/><path d="M7.5 9V6.5a4.5 4.5 0 019 0V9"/></g>
      <text x="30" y="78" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1a1a1a">IAM Role</text>
    </g>
  </g>

  <!-- IAM Role -> S3 (permission) -->
  <path d="M634,196 C 700,196 720,240 720,280" fill="none" stroke="#dd344c" stroke-width="1.8" marker-end="url(#a-red)"/>
  <rect x="662" y="222" width="118" height="18" rx="9" fill="#ffffff" stroke="#dd344c" stroke-width="1" opacity="0.95"/>
  <text x="721" y="235" text-anchor="middle" font-size="9.5" fill="#dd344c" font-family="ui-monospace, Consolas, monospace">s3 sync --delete</text>

  <!-- security boundary around storage+delivery -->
  <rect x="680" y="290" width="330" height="150" rx="10" fill="none" stroke="#dd344c" stroke-width="1.3" stroke-dasharray="3 4" opacity="0.85"/>

  <text x="695" y="278" font-family="Segoe UI, -apple-system, sans-serif" font-size="10.5" font-weight="700" fill="#757575" letter-spacing="0.03em">STORAGE + DELIVERY</text>
  <g font-family="Segoe UI, sans-serif">
    <g transform="translate(700,300)">
      <rect width="64" height="64" rx="10" fill="#7aa116"/>
      <g transform="translate(18,18)" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none"><path d="M4 6.5h20l-2 15.4a2.6 2.6 0 01-2.6 2.3H8.6A2.6 2.6 0 016 21.9L4 6.5z"/><ellipse cx="14" cy="6.5" rx="10" ry="3"/></g>
      <text x="32" y="82" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1a1a1a">S3 (private)</text>
      <text x="32" y="97" text-anchor="middle" font-size="9.5" fill="#757575">public access blocked</text>
    </g>
    <line x1="764" y1="332" x2="892" y2="332" stroke="#8c4fff" stroke-width="1.8" marker-end="url(#a-purple)"/>
    <rect x="778" y="323" width="100" height="18" rx="9" fill="#ffffff" stroke="#8c4fff" stroke-width="1"/>
    <text x="828" y="336" text-anchor="middle" font-size="9" fill="#8c4fff" font-family="ui-monospace, Consolas, monospace">origin access control</text>

    <g transform="translate(904,300)">
      <rect width="64" height="64" rx="10" fill="#8c4fff"/>
      <g transform="translate(18,18)" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none"><circle cx="14" cy="14" r="9.5"/><ellipse cx="14" cy="14" rx="4" ry="9.5"/><path d="M4.5 10.5h19M4.5 17.5h19"/></g>
      <text x="32" y="82" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1a1a1a">CloudFront</text>
      <text x="32" y="97" text-anchor="middle" font-size="9.5" fill="#757575">HTTPS edge cache</text>
    </g>
  </g>

  <!-- CloudFront -> Visitor -->
  <line x1="1050" y1="332" x2="1108" y2="332" stroke="#8a8f98" stroke-width="1.8" marker-end="url(#a-grey)"/>
  <rect x="1058" y="323" width="46" height="18" rx="9" fill="#ffffff" stroke="#8a8f98" stroke-width="1"/>
  <text x="1081" y="336" text-anchor="middle" font-size="9" fill="#4a4a4a" font-family="ui-monospace, Consolas, monospace">HTTPS</text>

  <text x="1116" y="278" font-family="Segoe UI, -apple-system, sans-serif" font-size="10.5" font-weight="700" fill="#757575" letter-spacing="0.03em">END USER</text>
  <g transform="translate(1116,300)" font-family="Segoe UI, sans-serif">
    <rect width="60" height="60" rx="10" fill="#414d5c"/>
    <g transform="translate(16,17)" stroke="#fff" stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round" fill="none"><rect x="1" y="2" width="26" height="19" rx="2.5"/><path d="M1 7.5h26"/><circle cx="5.4" cy="4.6" r="0.7" fill="#fff" stroke="none"/><circle cx="8" cy="4.6" r="0.7" fill="#fff" stroke="none"/></g>
    <text x="30" y="78" text-anchor="middle" font-size="11.5" font-weight="700" fill="#1a1a1a">Visitor</text>
  </g>

  <!-- ===== Terraform (bottom, provisions everything in the AWS Cloud box) ===== -->
  <text x="30" y="470" font-family="Segoe UI, -apple-system, sans-serif" font-size="11.5" font-weight="700" fill="#757575" letter-spacing="0.04em">INFRASTRUCTURE AS CODE</text>
  <g transform="translate(30,486)" font-family="Segoe UI, sans-serif">
    <rect width="66" height="66" rx="11" fill="#844fba"/>
    <g transform="translate(15,15)" fill="#fff"><rect x="0" y="0" width="14" height="14" rx="2"/><rect x="17" y="0" width="14" height="14" rx="2"/><rect x="8.5" y="17" width="14" height="14" rx="2"/></g>
    <text x="33" y="86" text-anchor="middle" font-size="12" font-weight="700" fill="#1a1a1a">Terraform</text>
    <text x="33" y="101" text-anchor="middle" font-size="9.5" fill="#757575">terraform/main.tf</text>
  </g>
  <path d="M96,505 C 250,505 380,320 474,222" fill="none" stroke="#844fba" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#a-tf)"/>
  <path d="M96,515 C 300,540 550,470 700,340" fill="none" stroke="#844fba" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#a-tf)"/>
  <path d="M96,525 C 350,565 700,510 904,340" fill="none" stroke="#844fba" stroke-width="1.6" stroke-dasharray="6 5" marker-end="url(#a-tf)"/>
  <text x="180" y="558" font-family="Segoe UI, -apple-system, sans-serif" font-size="10.5" fill="#844fba" font-style="italic">one `terraform apply` provisions &amp; reconciles every AWS resource above</text>

  <!-- legend -->
  <g font-family="Segoe UI, sans-serif" font-size="10.5" fill="#757575">
    <text x="1090" y="470" font-weight="700" fill="#757575" font-size="10.5" letter-spacing="0.03em">LEGEND</text>
    <rect x="1090" y="480" width="11" height="11" rx="2" fill="#414d5c"/><text x="1106" y="489">Tooling</text>
    <rect x="1090" y="498" width="11" height="11" rx="2" fill="#dd344c"/><text x="1106" y="507">Identity</text>
    <rect x="1090" y="516" width="11" height="11" rx="2" fill="#7aa116"/><text x="1106" y="525">Storage</text>
    <rect x="1090" y="534" width="11" height="11" rx="2" fill="#8c4fff"/><text x="1106" y="543">Delivery</text>
    <rect x="1090" y="552" width="11" height="11" rx="2" fill="#844fba"/><text x="1106" y="561">IaC</text>
  </g>
</svg>
