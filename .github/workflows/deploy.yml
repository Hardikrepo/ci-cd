name: Build, Test, Deploy Static Site

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Lint HTML
        run: npx --yes html-validate "site/**/*.html"
      - name: Build
        run: |
          mkdir -p public
          cp -r site/* public/
      - uses: actions/upload-artifact@v4
        with:
          name: site-build
          path: public
          retention-days: 1

  test:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site-build
          path: public
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Check links
        run: npx --yes linkinator public --recurse --silent

  deploy:
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      id-token: write
      contents: read
    environment:
      name: production
      url: https://${{ vars.CLOUDFRONT_DOMAIN_NAME }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: site-build
          path: public
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
      - name: Sync to S3
        run: aws s3 sync public "s3://${{ vars.S3_BUCKET }}" --delete
      - name: Invalidate CloudFront cache
        run: aws cloudfront create-invalidation --distribution-id "${{ vars.CLOUDFRONT_DISTRIBUTION_ID }}" --paths "/*"
